enabled: true
modelArtifacts:
  name: openai/gpt-oss-20b
  labels:
    llm-d.ai/inference-serving: 'true'
    llm-d.ai/model: openai_gpt_oss_20b
  uri: hf://openai/gpt-oss-20b
  size: 100Gi
authSecretName: ''
mountPath: /model-cache
accelerator:
  type: nvidia
  dra: false
routing:
  servicePort: 8000
  proxy:
    enabled: true
    image: ghcr.io/llm-d/llm-d-routing-sidecar:latest
    imagePullPolicy: Always
    targetPort: 8200
    connector: nixlv2
    zapLogLevel: info
multinode: false
decode:
  create: true
  replicas: 4
  parallelism:
    tensor: 1
    data: 2
    dataLocal: 1
    workers: 1
  containers:
  - name: vllm
    image: vllm/vllm-openai:latest
    modelCommand: vllmServe
    args:
    - --model
    - openai/gpt-oss-20b
    - --served-model-name
    - ? openai/gpt-oss-20b        - "--tensor-parallel-size"        - "1"        - "--pipeline-parallel-size"        - "1"        - "--data-parallel-size"        - "2"        - "--enable-expert-parallel"        - "--kv-cache-dtype"        - "auto"        - "--max-model-len"        - "10530"        - "--max-num-seqs"        - "512"        - "--max-num-batched-tokens"        - "11012"      env
      : []
    ports:
    - containerPort: 8200
      name: metrics
      protocol: TCP
    resources:
      limits:
        nvidia.com/gpu: 2
    mountModelVolume: true
    volumeMounts:
    - name: metrics-volume
      mountPath: /.config
  volumes:
  - name: metrics-volume
    emptyDir: {}
prefill:
  create: false
  replicas: 0
