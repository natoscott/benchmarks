# URLs scraped by the PCP openmetrics PMDA.
# vllm.url  — vLLM Prometheus metrics; update per model before each run.
#             Pattern: https://<model-name>-kserve-workload-svc.aiconfigurator.svc.cluster.local:8000/metrics
# dcgm.url  — DCGM GPU metrics (cluster-scoped in nvidia-gpu-operator, plain HTTP)
# epp.url   — EPP/inference-scheduler metrics; update per model before each run.
#             Pattern: http://<model-name>-epp-service.aiconfigurator.svc.cluster.local:9090/metrics
# kserve.url — KServe controller metrics (HTTPS/8443)
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetrics-pmda-configmap
  namespace: aiconfigurator
data:
  vllm.url: https://model-kserve-workload-svc.aiconfigurator.svc.cluster.local:8000/metrics
  dcgm.url: http://nvidia-dcgm-exporter.nvidia-gpu-operator.svc.cluster.local:9400/metrics
  epp.url: http://model-epp-service.aiconfigurator.svc.cluster.local:9090/metrics
  kserve.url: https://kserve-controller-manager-metrics-service.redhat-ods-applications.svc.cluster.local:8443/metrics
