# LLMInferenceService for openai/gpt-oss-120b — disagg top1 config from aiconfigurator.
#
# AIC prediction (ISL=9000, OSL=30, TTFT<=500ms, 8x H200):
#   Deployment: 1 replica = 7 prefill workers (TP=1) + 1 decode worker (TP=1) on 8 GPUs
#   Predicted:  28.7 req/s, TTFT=396ms, 860 tokens/s total
#
# Memory budget per GPU (H200, 140GB HBM):
#   Prefill weights (mxfp4 MoE): ~61.9 GB
#   Decode weights (mxfp4 MoE):  ~69.1 GB
#
# spec.prefill = prefill workers (vllm serve with prefill-only role)
# spec.template = decode workers (vllm serve with decode-only role)
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: gpt-oss-120b-disagg
  namespace: aiconfigurator
spec:
  baseRefs:
  - name: v3-4-0-kserve-config-llm-prefill-template
  - name: v3-4-0-kserve-config-llm-decode-template
  - name: v3-4-0-kserve-config-llm-scheduler
  - name: v3-4-0-kserve-config-llm-router-route
  model:
    name: "openai/gpt-oss-120b"
    uri: "pvc://model-storage-pvc/openai/gpt-oss-120b"
  parallelism:
    tensor: 1
  replicas: 1
  prefill:
    parallelism:
      tensor: 1
    replicas: 7
    template:
      containers:
      - name: main
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
        - name: VLLM_ADDITIONAL_ARGS
          value: >-
            --max-model-len 10530
            --max-num-seqs 1
            --max-num-batched-tokens 11012
        resources:
          requests:
            nvidia.com/gpu: "1"
            memory: 80Gi
          limits:
            nvidia.com/gpu: "1"
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --max-model-len 10530
          --max-num-seqs 512
          --max-num-batched-tokens 11012
      resources:
        requests:
          nvidia.com/gpu: "1"
          memory: 80Gi
        limits:
          nvidia.com/gpu: "1"
