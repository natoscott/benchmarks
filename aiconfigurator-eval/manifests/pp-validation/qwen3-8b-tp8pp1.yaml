# PP validation: Qwen/Qwen3-8B TP=8/PP=1 (1 replica x 8 GPUs)
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen3-8b-tp8pp1
  namespace: aiconfigurator
spec:
  baseRefs:
  - name: v3-5-0-ea-1-kserve-config-llm-template
  - name: v3-5-0-ea-1-kserve-config-llm-scheduler
  - name: v3-5-0-ea-1-kserve-config-llm-router-route
  model:
    name: "Qwen/Qwen3-8B"
    uri: "pvc://model-storage-pvc/Qwen__Qwen3-8B"
  parallelism:
    tensor: 8
    pipeline: 1
  replicas: 1
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --tensor-parallel-size 8
          --pipeline-parallel-size 1
          --gpu-memory-utilization 0.90
          --max-model-len 8000
          --max-num-seqs 256
      resources:
        requests:
          nvidia.com/gpu: "8"
          memory: 40Gi
        limits:
          nvidia.com/gpu: "8"
