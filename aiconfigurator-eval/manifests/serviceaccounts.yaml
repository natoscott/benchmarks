apiVersion: v1
kind: ServiceAccount
metadata:
  name: pcp
  namespace: aiconfigurator
---
# PCP pod needs privileged SCC to run systemd (pmcd/pmlogger/pmproxy).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pcp-privileged-aiconfigurator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: pcp
  namespace: aiconfigurator
---
# guidellm SA — no elevated privileges needed (it only runs guidellm commands).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guidellm
  namespace: aiconfigurator
---
# aiconfigurator SA — runs CLI to generate deployment configs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiconfigurator
  namespace: aiconfigurator
