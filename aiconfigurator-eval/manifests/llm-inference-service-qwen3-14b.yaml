# LLMInferenceService for Qwen/Qwen3-14B — agg config for benchmarking.
#
# AIC prediction (ISL=9000, OSL=30, b=8, tp=1, H200 SXM):
#   TTFT=1876ms, TPOT=55.7ms, req/s=2.29
#   Saturation ~2.3 req/s at ISL=9000
#
# Memory budget per GPU (H200, 140GB HBM):
#   Weights (bf16): ~28.0 GB
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen3-14b
  namespace: aiconfigurator
spec:
  baseRefs:
  - name: v3-4-0-kserve-config-llm-template
  - name: v3-4-0-kserve-config-llm-scheduler
  - name: v3-4-0-kserve-config-llm-router-route
  model:
    name: "Qwen/Qwen3-14B"
    uri: "pvc://model-storage-pvc/Qwen__Qwen3-14B"
  parallelism:
    tensor: 1
  replicas: 8
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --max-model-len 10530
          --max-num-seqs 512
          --max-num-batched-tokens 11012
      resources:
        requests:
          nvidia.com/gpu: "1"
          memory: 50Gi
        limits:
          nvidia.com/gpu: "1"
