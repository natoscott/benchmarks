# EPP EndpointPickerConfig: upstream llm-d optimized baseline.
# Adds kv-cache-utilization-scorer and no-hit-lru-scorer to the prior default.
# Source: https://github.com/llm-d/llm-d/tree/main/guides/optimized-baseline/
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-optimized-baseline
  namespace: llm-d-nathans-epp-eval
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: single-profile-handler
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: no-hit-lru-scorer
    - type: max-score-picker
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
      - pluginRef: no-hit-lru-scorer
        weight: 2
      - pluginRef: max-score-picker
