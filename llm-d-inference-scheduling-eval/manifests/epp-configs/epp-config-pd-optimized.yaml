# EPP EndpointPickerConfig: upstream llm-d P/D optimized baseline.
# Two scheduling profiles: prefill and decode with topology-specific scorers.
# Source: https://github.com/llm-d/llm-d/tree/main/guides/optimized-baseline/
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-pd-optimized
  namespace: llm-d-nathans-epp-eval
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: disagg-headers-handler
    - type: always-disagg-pd-decider
    - type: disagg-profile-handler
      parameters:
        deciderPluginName: always-disagg-pd-decider
    - type: prefill-filter
    - type: decode-filter
    - type: prefix-cache-scorer
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: active-request-scorer
    - type: max-score-picker
    schedulingProfiles:
    - name: prefill
      plugins:
      - pluginRef: prefill-filter
      - pluginRef: prefix-cache-scorer
        weight: 3
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: max-score-picker
    - name: decode
      plugins:
      - pluginRef: decode-filter
      - pluginRef: active-request-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
      - pluginRef: max-score-picker
