# LLMInferenceService for RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic — primary benchmark model.
#
# TP=2, gpu-memory-utilization=0.90.
# Dense FP8-quantised model on 2x H200 GPUs.
# This is the Jira-required model for the critical multiturn scenario.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: llama-70b
  namespace: llm-d-nathans-epp-eval
spec:
  baseRefs:
  - name: v3-5-0-ea-1-kserve-config-llm-template
  - name: epp-scheduler-prior-default
  - name: v3-5-0-ea-1-kserve-config-llm-router-route
  model:
    name: "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"
    uri: "pvc://model-storage-nfs/hub/models--RedHatAI--Llama-3.3-70B-Instruct-FP8-dynamic/snapshots/main"
  parallelism:
    tensor: 2
  replicas: 0
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --tensor-parallel-size 2
          --gpu-memory-utilization 0.90
          --max-num-seq 1024
          --max-model-len 40960
      resources:
        requests:
          nvidia.com/gpu: "2"
          memory: 200Gi
        limits:
          nvidia.com/gpu: "2"
