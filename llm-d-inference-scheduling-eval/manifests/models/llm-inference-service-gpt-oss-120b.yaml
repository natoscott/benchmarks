# LLMInferenceService for openai/gpt-oss-120b — MoE coverage model.
#
# TP=4, gpu-memory-utilization=0.90.
# MoE model (MXFP4) on 4x H200 GPUs.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: gpt-oss-120b
  namespace: llm-d-nathans-epp-eval
spec:
  baseRefs:
  - name: v3-5-0-ea-1-kserve-config-llm-template
  - name: epp-scheduler-prior-default
  - name: v3-5-0-ea-1-kserve-config-llm-router-route
  model:
    name: "openai/gpt-oss-120b"
    uri: "pvc://model-storage-nfs/hub/models--openai--gpt-oss-120b/snapshots/main"
  parallelism:
    tensor: 4
  replicas: 0
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --tensor-parallel-size 4
          --gpu-memory-utilization 0.90
          --max-num-seq 1024
          --max-model-len 40960
      resources:
        requests:
          nvidia.com/gpu: "4"
          memory: 400Gi
        limits:
          nvidia.com/gpu: "4"
