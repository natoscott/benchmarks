# Critical scenario from PSAP-2482: high-concurrency multiturn with prefix cache.
# Source: albertoperdomo2/benchflow/profiles/benchmark/multi-turn.yaml
#
# guidellm sweeps each concurrency level sequentially.
# max_requests = 10 * concurrency ensures consistent per-level sample sizes.
# prefix_count = 2 * concurrency ensures enough unique prefixes for cache diversity.
profile:
  kind: concurrent
  streams: [32, 64, 128, 256, 512]
data:
  kind: synthetic_text
  prompt_tokens: 128
  output_tokens: 128
  turns: 5
  prefix_buckets:
    - bucket_weight: 100
      prefix_tokens: 10000
      prefix_count: "2*concurrency"
constraint:
  kind: max_requests
  count: "10*concurrency"
requirements:
  min_max_model_len: 40960
