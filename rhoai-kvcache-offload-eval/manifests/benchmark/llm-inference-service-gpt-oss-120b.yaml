# LLMInferenceService for openai/gpt-oss-120b
# MoE model: 120B total params, 5.1B active, MXFP4-quantised expert weights + BF16 non-expert.
# Fits on a single 80GB GPU — on H200 (140 GB) weights/GPU at TP=2 are ~35-40 GB.
# Because GPU headroom is large relative to model weight, gpu-memory-utilization is set
# lower (0.65) so the GPU KV cache does not dwarf the CPU offload capacity.
#
# H200 KV cache budget at gpu-util=0.65, TP=2 (estimated weights 35 GB/GPU):
#   Reserved per GPU: 140 * 0.65 = 91 GB
#   Weights per GPU:  ~35 GB
#   GPU KV per GPU:   ~56 GB → ~112 GB total GPU KV
#   CPU KV (20K blks): depends on MoE attention architecture; estimated ~60-80 GB
#   Offload exercises at moderate-to-high concurrency when GPU KV fills.
#
# NOTE: gpu-memory-utilization and num_cpu_blocks should be tuned after the first
# run once vLLM logs report the actual block sizes for this model's architecture.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: gpt-oss-120b
  namespace: llm-d-pfc-cpu
spec:
  baseRefs:
  - name: v3-3-0-kserve-config-llm-template
  - name: v3-3-0-kserve-config-llm-scheduler
  - name: v3-3-0-kserve-config-llm-router-route
  model:
    name: "openai/gpt-oss-120b"
    # pvc:// uses enableDirectPvcVolumeMount=true (no storage-initializer auth needed).
    # Model must be pre-downloaded to the PVC via scripts/download-models.sh first.
    uri: "pvc://model-storage-pvc/models/openai/gpt-oss-120b"
  parallelism:
    tensor: 2
  replicas: 1
  template:
    initContainers:
    - name: storage-initializer
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --tensor-parallel-size 2
          --gpu-memory-utilization 0.65
          --max-num-seq 1024
      resources:
        requests:
          nvidia.com/gpu: "2"
          memory: 200Gi
        limits:
          nvidia.com/gpu: "2"
