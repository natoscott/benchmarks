# EPP inference-scheduler plugin configuration using Valkey as the shared
# KV block index backend. Both gpu-prefix-cache-scorer and cpu-prefix-cache-scorer
# use Valkey so that prefix cache state is shared across replicas and persists
# across pod restarts — essential for the 2-replica case.
#
# Mounted into the EPP pod via spec.router.scheduler.template in each
# LLMInferenceService manifest.
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-valkey
  namespace: llm-d-pfc-cpu
data:
  config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
      name: gpu-prefix-cache-scorer
      parameters:
        indexerConfig:
          kvBlockIndexConfig:
            redisConfig:
              address: "valkey://valkey.llm-d-pfc-cpu.svc.cluster.local:6379"
              backendType: "valkey"
    - type: prefix-cache-scorer
      name: cpu-prefix-cache-scorer
      parameters:
        autoTune: false
        lruCapacityPerServer: 41000
        indexerConfig:
          kvBlockIndexConfig:
            redisConfig:
              address: "valkey://valkey.llm-d-pfc-cpu.svc.cluster.local:6379"
              backendType: "valkey"
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: gpu-prefix-cache-scorer
        weight: 1
      - pluginRef: cpu-prefix-cache-scorer
        weight: 1
