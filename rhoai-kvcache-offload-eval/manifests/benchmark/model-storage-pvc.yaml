# Local NVMe storage on GPU node (lvms-vg-gpu-node).
# WaitForFirstConsumer: PVC binds to whichever GPU node the first consumer pod
# schedules on. All subsequent pods that mount this PVC (vLLM replicas, guidellm)
# must also schedule on that same node — this is the correct behaviour for a single-
# node benchmark configuration. For cross-node 2-replica testing, a second PVC
# would be needed (future work).
#
# Sizing: Llama-3.1-70B FP16 ~140 GB + 120B model ~240 GB + HF cache overhead
# = ~700 GB total. 1 Ti gives comfortable headroom.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage-pvc
  namespace: llm-d-pfc-cpu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
  storageClassName: lvms-vg-gpu-node
