# Custom LLMInferenceServiceConfig that extends the base RHOAI EPP scheduler
# with a Valkey-backed plugin configuration.
# Referenced in LLMInferenceService baseRefs instead of
# v3-3-0-kserve-config-llm-scheduler.
#
# Cloned from v3-3-0-kserve-config-llm-scheduler in redhat-ods-applications,
# with --config-file added to args and epp-config-valkey ConfigMap mounted.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceServiceConfig
metadata:
  name: epp-scheduler-valkey
  namespace: llm-d-pfc-cpu
spec:
  router:
    scheduler:
      pool:
        spec:
          extensionRef:
            failureMode: FailOpen
            group: ""
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
          selector: {}
          targetPortNumber: 8000
      template:
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 30
        volumes:
        - name: tls-certs
          secret:
            secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
        - name: epp-config
          configMap:
            name: epp-config-valkey
        containers:
        - name: main
          image: registry.redhat.io/rhoai/odh-llm-d-inference-scheduler-rhel9@sha256:c7abb4c34c70096fcf00db80cfbff09625c0bb9b58d271fe04cf51efdd591c31
          imagePullPolicy: IfNotPresent
          args:
          - --pool-name
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --pool-namespace
          - '{{ .ObjectMeta.Namespace }}'
          - --pool-group
          - inference.networking.x-k8s.io
          - --zap-encoder
          - json
          - --grpc-port
          - "9002"
          - --grpc-health-port
          - "9003"
          - --secure-serving
          - --model-server-metrics-scheme
          - https
          - --cert-path
          - /var/run/kserve/tls
          - --config-file
          - /config/config.yaml
          env:
          - name: SSL_CERT_DIR
            value: /var/run/secrets/kubernetes.io/serviceaccount:/etc/pki/tls/certs
          ports:
          - containerPort: 9002
            name: grpc
            protocol: TCP
          - containerPort: 9003
            name: grpc-health
            protocol: TCP
          - containerPort: 9090
            name: metrics
            protocol: TCP
          - containerPort: 5557
            name: zmq
            protocol: TCP
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - name: tls-certs
            mountPath: /var/run/kserve/tls
            readOnly: true
          - name: epp-config
            mountPath: /config
            readOnly: true
