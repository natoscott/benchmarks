# LLMInferenceService for RedHatAI/Meta-Llama-3.1-70B-Instruct-FP8
# FP8-quantised weights: ~35 GB/GPU at TP=2 (vs 70 GB for FP16), no gated license.
# - TP=2: 2 H200 GPUs per replica
# - Replicas: set to 1 or 2 by run-benchmark.sh
# - PARAMETERS env var drives kv-transfer-config:
#     "no-offload"          → no --kv-transfer-config flag
#     "native-offload-20k"  → OffloadingConnector with num_cpu_blocks=20000
#
# H200 KV cache budget at gpu-util=0.75, TP=2:
#   Reserved per GPU: 140 * 0.75 = 105 GB
#   Weights per GPU:  ~35 GB  (70B FP8 / 2)
#   GPU KV per GPU:   ~70 GB  → ~140 GB total GPU KV cache
#   CPU KV (20K blks):  ~100 GB total (BF16 KV cache assumed)
#   CPU adds ~40% more effective KV capacity — exercises offload at moderate concurrency
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: llama-70b
  namespace: llm-d-pfc-cpu
spec:
  baseRefs:
  - name: v3-3-0-kserve-config-llm-template
  - name: epp-scheduler-valkey        # replaces v3-3-0-kserve-config-llm-scheduler
  - name: v3-3-0-kserve-config-llm-router-route
  model:
    name: "RedHatAI/Meta-Llama-3.1-70B-Instruct-FP8"
    # pvc:// uses enableDirectPvcVolumeMount=true (no storage-initializer auth needed).
    # Model must be pre-downloaded to the PVC via scripts/download-models.sh first.
    uri: "pvc://model-storage-pvc/models/RedHatAI/Meta-Llama-3.1-70B-Instruct-FP8"
  parallelism:
    tensor: 2
  replicas: 1
  template:
    containers:
    - name: main
      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN
      # VLLM_ADDITIONAL_ARGS is consumed by the RHOAI vLLM entrypoint script.
      # run-benchmark.sh patches this value for each configuration.
      - name: VLLM_ADDITIONAL_ARGS
        value: >-
          --tensor-parallel-size 2
          --gpu-memory-utilization 0.75
          --max-num-seq 1024
      resources:
        requests:
          nvidia.com/gpu: "2"
          memory: 200Gi
        limits:
          nvidia.com/gpu: "2"
