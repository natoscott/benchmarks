# URLs scraped by the PCP openmetrics PMDA.
# vllm.url  — vLLM Prometheus metrics (kserve-managed pod, HTTPS with self-signed cert).
#             SSL cert verification is disabled in pmdaopenmetrics via a verify=False
#             patch applied in the PCP pod startup script (see pcp-deployment.yaml).
#             run-benchmark.sh patches the URL per model before each PCP restart.
# dcgm.url  — DCGM GPU metrics (cluster-scoped in nvidia-gpu-operator, plain HTTP)
# epp.url   — EPP/inference-scheduler metrics (per-model, HTTP port 9090)
#             run-benchmark.sh patches this per model before each PCP restart.
# kserve.url — KServe controller metrics (HTTPS/8443, same verify=False patch applies)
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetrics-pmda-configmap
  namespace: llm-d-pfc-cpu
data:
  vllm.url: https://llama-70b-kserve-workload-svc.llm-d-pfc-cpu.svc.cluster.local:8000/metrics
  dcgm.url: http://nvidia-dcgm-exporter.nvidia-gpu-operator.svc.cluster.local:9400/metrics
  epp.url: http://llama-70b-epp-service.llm-d-pfc-cpu.svc.cluster.local:9090/metrics
  kserve.url: https://kserve-controller-manager-metrics-service.redhat-ods-applications.svc.cluster.local:8443/metrics
