apiVersion: v1
kind: ConfigMap
metadata:
  name: pcp-monitoring-config
  namespace: pcp-monitoring
data:
  # pmcd.conf -- PMDAs to load on every node.
  # pmdanvidia uses dlopen() for NVML at runtime; it degrades gracefully on
  # nodes where libnvidia-ml.so is not present (pmcd logs the failure and
  # continues with remaining PMDAs).
  pmcd.conf: |
    # Auto-generated PMDAs (do not remove these lines -- managed by pmcd)
    [access]
    disallow * : store;
    allow localhost : all;
    allow * : fetch;

  # pmlogger zeroconf configuration -- log everything pmcd exposes.
  # pcp-zeroconf defaults: 10s interval, 15 days retention (pmlogger_daily
  # rotates and culls archives automatically).
  pmlogger.conf: |
    log mandatory on default {
        all
    }

  # pmproxy configuration -- enable REST API and series (pmseries) support.
  pmproxy.conf: |
    [pmproxy]
    chunksize = 65536
    [pmseries]
    enabled = false

  # openmetrics PMDA configuration for DCGM metrics on GPU nodes.
  # On non-GPU nodes this endpoint is unreachable and the PMDA logs a warning;
  # all other PMDAs continue normally.
  # Update the URL if the DCGM exporter port or address changes.
  dcgm.url: |
    http://localhost:9400/metrics
