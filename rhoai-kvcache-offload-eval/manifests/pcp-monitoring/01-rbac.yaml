apiVersion: v1
kind: ServiceAccount
metadata:
  name: pcp-monitoring
  namespace: pcp-monitoring
---
# Allow the SA to use the privileged SCC (required for hostNetwork, hostPID,
# hostPath volumes and the privileged container needed for /proc /sys access).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pcp-monitoring-scc
rules:
- apiGroups: ["security.openshift.io"]
  resources: ["securitycontextconstraints"]
  verbs: ["use"]
  resourceNames: ["privileged"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pcp-monitoring-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pcp-monitoring-scc
subjects:
- kind: ServiceAccount
  name: pcp-monitoring
  namespace: pcp-monitoring
