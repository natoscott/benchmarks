# NodePort Service for pmproxy -- provides a stable cluster-external entry
# point for the PCP REST API and pmseries queries on each node.
#
# With hostNetwork: true the ports are already reachable on the node IP
# directly (if firewall/security-group rules permit). This Service adds a
# cluster-DNS name and NodePort for convenience.
#
# Remote access patterns:
#
#   # Direct node IP (hostNetwork, no port-forward needed inside cluster):
#   pmrep --host <node-ip> kernel.all.load
#
#   # From a laptop via oc port-forward (works through any firewall):
#   oc port-forward -n pcp-monitoring daemonset/pcp-monitoring 44321 44322
#   pmrep --host localhost kernel.all.load
#   curl http://localhost:44322/pmapi/metrics
#
#   # NodePort (if cluster firewall allows NodePort range ~30000-32767):
#   pmrep --host <node-ip>:30321 kernel.all.load
#
apiVersion: v1
kind: Service
metadata:
  name: pcp-monitoring
  namespace: pcp-monitoring
  labels:
    app.kubernetes.io/name: pcp-monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: pcp-monitoring
  ports:
  - name: pmcd
    port: 44321
    targetPort: 44321
    nodePort: 30321
    protocol: TCP
  - name: pmproxy
    port: 44322
    targetPort: 44322
    nodePort: 30322
    protocol: TCP
