processor:
  config:
    dispatchMode: sync
    concurrency:
      global: 200
      perEndpoint: 100
      recovery: 5
      aimd:
        enabled: false
    globalInferenceGateway:
      url: "http://placeholder-patched-by-run-benchmark:80"
      requestTimeout: "5m"
      maxRetries: 3
      initialBackoff: "1s"
      maxBackoff: "60s"
      tlsInsecureSkipVerify: true
