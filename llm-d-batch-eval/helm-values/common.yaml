global:
  secretName: batch-gateway-secrets
  dbClient:
    type: postgresql
  fileClient:
    type: fs
    fs:
      pvcName: batch-gateway-files

# Upstream v0.2.0 images — RHOAI 3.5 EA images lack AIMD and job-level metrics
apiserver:
  image:
    repository: ghcr.io/llm-d/batch-gateway-apiserver
    tag: "v0.2.0"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  config:
    batchAPI:
      passThroughHeaders:
      - Authorization

processor:
  image:
    repository: ghcr.io/llm-d/batch-gateway-processor
    tag: "v0.2.0"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  workDirVolume:
    sizeLimit: 10Gi

gc:
  image:
    repository: ghcr.io/llm-d/batch-gateway-gc
    tag: "v0.2.0"
    pullPolicy: IfNotPresent
