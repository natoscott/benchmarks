global:
  secretName: batch-gateway-secrets
  dbClient:
    type: postgresql
  fileClient:
    type: fs
    fs:
      pvcName: batch-gateway-files

# RHOAI 3.5 EA2 batch-gateway images (digest-pinned via ImageDigestMirrorSet).
apiserver:
  image:
    repository: registry.redhat.io/rhoai/odh-llm-d-batch-gateway-apiserver-rhel9
    digest: "sha256:83230cbe829f9d9fda33171b63975de40438a07014c472737deae57d7b62d64c"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  config:
    batchAPI:
      passThroughHeaders:
      - Authorization

processor:
  image:
    repository: registry.redhat.io/rhoai/odh-llm-d-batch-gateway-processor-rhel9
    digest: "sha256:936edb737f23975bf5913f3fac3e52a395bbf8a913e73d7285fc2fb27854892f"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  workDirVolume:
    sizeLimit: 10Gi

gc:
  enabled: true
  image:
    repository: registry.redhat.io/rhoai/odh-llm-d-batch-gateway-gc-rhel9
    digest: "sha256:c9834ad491025f9bc51be439042b873505b5f45ffc42ef59d1739549805daf9e"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
