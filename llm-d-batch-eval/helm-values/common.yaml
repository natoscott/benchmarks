global:
  secretName: batch-gateway-secrets
  dbClient:
    type: postgresql
  fileClient:
    type: fs
    fs:
      pvcName: batch-gateway-files

# RHOAI 3.5 EA2 batch-gateway images.
apiserver:
  image:
    repository: quay.io/rhoai/odh-llm-d-batch-gateway-apiserver-rhel9
    tag: "rhoai-3.5-ea.2"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  config:
    batchAPI:
      passThroughHeaders:
      - Authorization

processor:
  image:
    repository: quay.io/rhoai/odh-llm-d-batch-gateway-processor-rhel9
    tag: "rhoai-3.5-ea.2"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
  workDirVolume:
    sizeLimit: 10Gi

# GC — re-enable for EA2, check if health probe is fixed.
gc:
  enabled: true
  image:
    repository: quay.io/rhoai/odh-llm-d-batch-gateway-gc-rhel9
    tag: "rhoai-3.5-ea.2"
    pullPolicy: IfNotPresent
  podSecurityContext: {}
