# LLMInferenceServiceConfig: extends the RHOAI 3.5 EA2 EPP scheduler with
# Valkey-backed prefix-cache routing.
# Referenced in LLMInferenceService baseRefs as "epp-scheduler-valkey".
#
# Uses spec.router.scheduler.config.ref to inject the Valkey EndpointPickerConfig
# via the epp-config-valkey ConfigMap.
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: epp-scheduler-valkey
  namespace: llm-d-batch
spec:
  router:
    scheduler:
      annotations:
        app.kubernetes.io/version: 0.7.0
        certificates.kserve.io/expiration-v2: "true"
      config:
        ref:
          name: epp-config-valkey
          key: config.yaml
      pool:
        spec:
          endpointPickerRef:
            failureMode: FailOpen
            group: ""
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
            port:
              number: 9002
          selector:
            matchLabels:
              app.kubernetes.io/name: '{{ .ObjectMeta.Name }}'
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
          - number: 8000
      template:
        volumes:
        - name: tls-certs
          secret:
            secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
        - emptyDir: {}
          name: tokenizer-uds
        - emptyDir: {}
          name: tokenizer-tmp
        - emptyDir: {}
          name: tokenizer-cache
        containers:
        - name: main
          image: registry.redhat.io/rhoai/odh-llm-d-router-endpoint-picker-rhel9@sha256:a7e4817ae52f18287f45d548d0c16de598e13b1c823db4d144f5085363a72b43
          imagePullPolicy: IfNotPresent
          command:
          - /app/epp
          - --pool-name
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --pool-namespace
          - '{{ .ObjectMeta.Namespace }}'
          - --zap-encoder
          - json
          - --grpc-port
          - "9002"
          - --grpc-health-port
          - "9003"
          - --model-server-metrics-scheme=https
          - --cert-path=/var/run/kserve/tls
          - --metrics-endpoint-auth=false
          env:
          - name: SSL_CERT_DIR
            value: /var/run/kserve/tls:/var/run/secrets/kubernetes.io/serviceaccount:/etc/pki/tls/certs
          ports:
          - containerPort: 9002
            name: grpc
            protocol: TCP
          - containerPort: 9003
            name: grpc-health
            protocol: TCP
          - containerPort: 9090
            name: metrics
            protocol: TCP
          - containerPort: 5557
            name: zmq
            protocol: TCP
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            grpc:
              port: 9003
              service: liveness
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9003
              service: readiness
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - name: tls-certs
            mountPath: /var/run/kserve/tls
            readOnly: true
          - name: tokenizer-uds
            mountPath: /tmp/tokenizer
        - name: tokenizer
          image: registry.redhat.io/rhoai/odh-llm-d-kv-cache-rhel9@sha256:32ac10d178218671c7afd0f091f5d100ead1b15275264bbe9f3a745e5dfe56a5
          imagePullPolicy: IfNotPresent
          env:
          - name: TOKENIZERS_DIR
            value: /mnt/models
          ports:
          - containerPort: 8082
            name: health
            protocol: TCP
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            httpGet:
              path: /healthz
              port: 8082
            failureThreshold: 60
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            failureThreshold: 3
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - name: tokenizer-tmp
            mountPath: /tmp
          - name: tokenizer-cache
            mountPath: /.cache
          - name: tokenizer-uds
            mountPath: /tmp/tokenizer
          workingDir: /mnt/models
