# EPP EndpointPickerConfig for EA2 (llm-d-router).
# Valkey-backed prefix cache via precise-prefix-cache-producer data plugin.
# utilization-detector is auto-registered in EA2.
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config-valkey
  namespace: llm-d-batch
data:
  config.yaml: |
    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: precise-prefix-cache-producer
      name: valkey-prefix-producer
      parameters:
        indexerConfig:
          kvBlockIndexConfig:
            redisConfig:
              address: "valkey://valkey.llm-d-batch.svc.cluster.local:6379"
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 1
