# URLs scraped by the PCP openmetrics PMDA.
# run-benchmark.sh patches vllm.url and epp.url per model before each PCP restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetrics-pmda-configmap
  namespace: llm-d-batch
data:
  vllm.url: https://qwen3-8b-kserve-workload-svc.llm-d-batch.svc.cluster.local:8000/metrics
  dcgm.url: http://nvidia-dcgm-exporter.nvidia-gpu-operator.svc.cluster.local:9400/metrics
  epp.url: http://qwen3-8b-epp-service.llm-d-batch.svc.cluster.local:9090/metrics
  kserve.url: https://kserve-controller-manager-metrics-service.redhat-ods-applications.svc.cluster.local:8443/metrics
  batch-gateway-processor.url: http://batch-gateway-processor.llm-d-batch.svc.cluster.local:9090/metrics
  batch-gateway-apiserver.url: http://batch-gateway-apiserver.llm-d-batch.svc.cluster.local:8081/metrics
