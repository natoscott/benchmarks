inferenceExtension:
  replicas: 1
  flags:
    # vLLM 0.6.5 uses the standard metric name
    kv-cache-usage-percentage-metric: "vllm:kv_cache_usage_perc"
    v: 1
  image:
    name: llm-d-inference-scheduler
    hub: ghcr.io/llm-d
    tag: v0.5.1
  extProcPort: 9002
  monitoring:
    interval: "10s"
    # Prometheus ServiceMonitor disabled for now
    prometheus:
      enabled: false

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/inference-serving: "true"

provider:
  name: istio
  istio:
    destinationRule:
      host: llm-d-infpool-epp.llm-d-pfc-cpu.svc.cluster.local
      trafficPolicy:
        tls:
          mode: SIMPLE
          insecureSkipVerify: true
        connectionPool:
          http:
            http1MaxPendingRequests: 256000
            maxRequestsPerConnection: 256000
            http2MaxRequests: 256000
            idleTimeout: "900s"
          tcp:
            maxConnections: 256000
            maxConnectionDuration: "1800s"
            connectTimeout: "900s"
