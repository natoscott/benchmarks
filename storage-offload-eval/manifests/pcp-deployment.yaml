# PCP (Performance Co-Pilot) collector for storage benchmark analysis.
# Co-locates with fio-pod via podAffinity. Captures:
#   - Kernel PMDAs: disk, network, cpu, memory on the benchmark node
#   - openmetrics PMDA: Ceph cluster metrics + ODF metrics via three endpoints:
#       ceph-mgr:9283       — OSD I/O, pool stats, RGW rates (HTTP, no auth)
#       ceph-exporter:9926  — per-node Ceph perf counters (HTTP, no auth)
#       ocs-metrics-exporter:8443 — ODF capacity/health (HTTPS, SA token auth)
#
# Deploy before starting any FIO run:
#   kubectl apply -f manifests/openmetrics-configmap.yaml
#   kubectl apply -f manifests/pcp-serviceaccount.yaml
#   kubectl apply -f manifests/pcp-deployment.yaml
#   kubectl rollout status deployment/pcp -n storage-offload-eval
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcp
  namespace: storage-offload-eval
  labels:
    app.kubernetes.io/name: pcp
    app.kubernetes.io/instance: pcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pcp
      app.kubernetes.io/instance: pcp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pcp
        app.kubernetes.io/instance: pcp
        app: pcp
        name: pcp
    spec:
      serviceAccountName: pcp
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fio-pod
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 15
      containers:
        - name: pcp
          image: ghcr.io/performancecopilot/pcp:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              sed -i 's/PMCD_LOCAL=1/PMCD_LOCAL=0/' /etc/sysconfig/pmcd
              # Make the ocs.sh fetch script executable (ConfigMap mounts are not +x).
              chmod +x /var/lib/pcp/pmdas/openmetrics/config.d/ocs.sh 2>/dev/null || true
              exec /usr/bin/container-entrypoint /usr/sbin/init
          env:
            - name: PCP_DOMAIN_AGENTS
              value: openmetrics
            - name: PCP_SERVICES
              value: pmcd,pmlogger
          ports:
            - name: pmcd-port
              containerPort: 44321
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: pmcd-port
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: [/bin/bash, -c, "systemctl is-active pmcd"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            seccompProfile:
              type: Unconfined
          volumeMounts:
            - name: openmetrics-pmlogconf
              mountPath: /var/lib/pcp/config/pmlogconf/openmetrics
              readOnly: true
            - name: openmetrics-pmda
              mountPath: /var/lib/pcp/pmdas/openmetrics/config.d
            - name: pmlogger-storage
              mountPath: /var/log/pcp/pmlogger
      volumes:
        - name: openmetrics-pmlogconf
          configMap:
            name: openmetrics-pmlogconf-configmap
        - name: openmetrics-pmda
          configMap:
            name: openmetrics-pmda-configmap
            defaultMode: 0755
        - name: pmlogger-storage
          hostPath:
            path: /var/log/pcp/pmlogger
            type: DirectoryOrCreate
