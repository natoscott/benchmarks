# PVC for storage-offload-eval FIO benchmarking.
# Update storageClassName to match the local NVMe storage class on your cluster.
# Use ReadWriteOnce; a single PVC lands on one physical drive (linear LVM pool).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fio-nvme
  namespace: storage-offload-eval
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: lvms-vg-gpu-node
  resources:
    requests:
      storage: 20Gi
