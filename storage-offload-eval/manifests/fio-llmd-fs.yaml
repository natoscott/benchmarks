# FIO benchmark for llmd_fs_backend KV cache offload connector (llm-d ≤ v0.7.0).
#
# I/O MODEL: Buffered writes (1 MB C++ buffer + kernel page cache). NO O_DIRECT.
# Source: llm-d-kv-cache/kv_connectors/llmd_fs_backend/csrc/storage/backends/fs_io/
#
# The connector groups 16 GPU KV blocks into one file before writing.
# With block_size=256 tokens and vLLM gpu_block_size=16 tokens:
#   gpu_blocks_per_file = 256 / 16 = 16
#
# File write sizes (16 × GPU KV block size per server, TP=2, BF16 KV dtype):
#   FP8-70B / BF16-70B:  16 × 5 MB   = 80 MB per file
#   gpt-oss-120b (MoE):  16 × 1.2 MB = ~19 MB per file
#   Qwen3-32B (AWQ):     16 × 450 KB = ~7 MB per file
#   Qwen3-8B:            16 × 256 KB = ~4 MB per file
#
# Note: PCP disk metrics during actual runs showed ~1 KB effective disk I/O size
# for Qwen3 models. This is the KERNEL page cache flush granularity, not the
# application write() size. FIO with direct=0 reproduces the application-level
# write at the file size; the OS will issue the actual disk I/O internally.
#
# Primary metric: sustained THROUGHPUT (MB/s) at the file write size.
# Pass criteria: ≥ 20 MB/s at numjobs=16 (2× safety margin over peak demand).
#
# Prerequisites:
#   kubectl apply -f pvcs.yaml
# Run:
#   kubectl apply -f fio-llmd-fs.yaml -n <your-namespace>
# Results:
#   kubectl logs -f job/fio-llmd-fs -n <your-namespace>

apiVersion: batch/v1
kind: Job
metadata:
  name: fio-llmd-fs
  namespace: storage-offload-eval
  labels:
    connector: llmd-fs-backend
    io-model: buffered
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: fio
        image: nixery.dev/shell/fio
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            DATADIR=/data/fio-llmd
            mkdir -p "${DATADIR}"

            run() {
              local TAG=$1 RW=$2 BS=$3 JOBS=$4
              echo ""
              echo "=========================================="
              echo "TEST  tag=${TAG}  rw=${RW}  bs=${BS}  numjobs=${JOBS}"
              echo "IO    BUFFERED (llmd_fs_backend model, no O_DIRECT)"
              echo "=========================================="
              fio \
                --name="${TAG}" \
                --directory="${DATADIR}" \
                --direct=0 \
                --rw="${RW}" \
                --bs="${BS}" \
                --ioengine=sync \
                --iodepth=1 \
                --numjobs="${JOBS}" \
                --size=4G \
                --runtime=60 \
                --time_based \
                --group_reporting \
                --lat_percentiles=1
              echo "--- END ${TAG} ---"
              sync
              echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
              rm -rf "${DATADIR}"
              mkdir -p "${DATADIR}"
            }

            echo "### llmd_fs_backend: buffered file-level I/O             ###"
            echo "### Block sizes = 16 GPU KV blocks per file (bs_factor=16) ###"
            echo ""

            # ── FP8-70B / BF16-70B: 16 × 5 MB = 80 MB per file ─────────────────
            echo "=== FP8-70B / BF16-70B: bs=80m (16 blocks/file) ==="
            for JOBS in 1 16 64; do
              run "fp8-70b-write-j${JOBS}" write 80m "${JOBS}"
              run "fp8-70b-read-j${JOBS}"  read  80m "${JOBS}"
            done

            # ── gpt-oss-120b: 16 × 1.2 MB ≈ 19 MB per file ─────────────────────
            echo "=== gpt-oss-120b: bs=19m ==="
            for JOBS in 1 16 64; do
              run "gpt120b-write-j${JOBS}" write 19m "${JOBS}"
              run "gpt120b-read-j${JOBS}"  read  19m "${JOBS}"
            done

            # ── Qwen3-32B: 16 × 450 KB ≈ 7 MB per file ─────────────────────────
            echo "=== Qwen3-32B: bs=7m ==="
            for JOBS in 1 16 64; do
              run "qwen32b-write-j${JOBS}" write 7m "${JOBS}"
              run "qwen32b-read-j${JOBS}"  read  7m "${JOBS}"
            done

            # ── Qwen3-8B: 16 × 256 KB ≈ 4 MB per file ──────────────────────────
            echo "=== Qwen3-8B: bs=4m ==="
            for JOBS in 1 16 64; do
              run "qwen8b-write-j${JOBS}" write 4m "${JOBS}"
              run "qwen8b-read-j${JOBS}"  read  4m "${JOBS}"
            done

            echo ""
            echo "=== ALL llmd-fs TESTS COMPLETE ==="
        volumeMounts:
        - name: storage
          mountPath: /data
        resources:
          requests:
            cpu: "8"
            memory: "8Gi"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: fio-nfs
