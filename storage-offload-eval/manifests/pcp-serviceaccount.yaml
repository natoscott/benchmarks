apiVersion: v1
kind: ServiceAccount
metadata:
  name: pcp
  namespace: storage-offload-eval
---
# PCP requires privileged access to read kernel performance counters (disk, net, cpu, mem PMDAs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pcp-storage-offload-eval-privileged
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: pcp
    namespace: storage-offload-eval
---
# cluster-monitoring-view allows the SA token to pass kube-rbac-proxy authentication
# on the ocs-metrics-exporter endpoint (HTTPS, bearer token).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pcp-storage-offload-eval-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: pcp
    namespace: storage-offload-eval
