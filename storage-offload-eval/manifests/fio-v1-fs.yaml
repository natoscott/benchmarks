# FIO benchmark for vLLM v1 filesystem KV cache offload connector.
#
# I/O MODEL: O_DIRECT, one file per GPU KV block, one os.write() per block.
# Source: vllm/v1/kv_offload/tiering/fs/io.py
#
# BLOCK SIZES: actual GPU KV cache block sizes (server-wide, TP=2, BF16 KV dtype):
#   FP8-70B / BF16-70B:  ~5 MB   (80 layers × 8 KV heads × 128 dim × 16 tok × 2B)
#   gpt-oss-120b (MoE):  ~576 KB  (36 layers × 8 KV heads × 64 dim × 16 tok × 2B)
#   Qwen3-32B:           ~448 KB
#   Qwen3-8B:            ~256 KB
#   (block sizes derived from vLLM startup logs; see REPORT.md for method)
#
# STORAGE CONTEXT (athena-fire, lvms-vg-gpu-node-n2):
#   Device:  8× Micron 7450 MTFDKCC7T6TFR PCIe Gen4 NVMe
#   LVM:     linear thin pool (one PVC lands on one NVMe drive)
#   XFS:     bsize=4096, sectsz=4096 (4Kn native), sunit=1MiB, swidth=32MiB
#
# ALIGNMENT: sectsz=4096 means all O_DIRECT writes must be ≥4096-byte aligned.
#   All block sizes tested here are multiples of 4KiB — alignment is satisfied.
#   FIO enforces O_DIRECT alignment automatically via direct=1.
#
# PRIMARY METRIC: per-operation LATENCY (p50, p99).
#   A block load is on the critical path before the first inference token.
#
# CONCURRENCY: numjobs models connector thread count (threads_per_gpu=16 default).
#   Each job creates its own file (matching one-file-per-block connector design).
#
# Prerequisites:
#   kubectl apply -f pvcs.yaml
# Run:
#   kubectl apply -f fio-v1-fs.yaml -n storage-offload-eval
# Results:
#   kubectl logs -f job/fio-v1-fs -n storage-offload-eval

apiVersion: batch/v1
kind: Job
metadata:
  name: fio-v1-fs
  namespace: storage-offload-eval
  labels:
    connector: vllm-v1-fs
    io-model: o_direct
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: psap-fire-athena-bnfx9-worker-2-gpu-h200-k6qsd
      containers:
      - name: fio
        image: nixery.dev/shell/fio
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            DATADIR=/data/fio-v1
            mkdir -p "${DATADIR}"

            # Each job gets its own file (matching one-file-per-block connector design).
            # size=2G per job: 16 jobs × 2G = 32G max, well within PVC capacity.
            run() {
              local TAG=$1 RW=$2 BS=$3 JOBS=$4
              echo ""
              echo "=========================================="
              echo "TEST  rw=${RW}  bs=${BS}  numjobs=${JOBS}"
              echo "TAG   ${TAG}"
              echo "MODEL ${5:-}"
              echo "=========================================="
              fio \
                --name="${TAG}" \
                --directory="${DATADIR}" \
                --direct=1 \
                --rw="${RW}" \
                --bs="${BS}" \
                --ioengine=libaio \
                --iodepth=1 \
                --numjobs="${JOBS}" \
                --size=2G \
                --runtime=60 \
                --time_based \
                --group_reporting \
                --lat_percentiles=1 \
                --output-format=json+
              echo "--- END ${TAG} ---"
              rm -rf "${DATADIR}"
              mkdir -p "${DATADIR}"
            }

            echo "### vLLM v1 fs connector — O_DIRECT block-level I/O ###"
            echo "### Block sizes match actual GPU KV cache block size  ###"
            echo ""

            # ── Qwen3-8B: ~256 KB ────────────────────────────────────────────────
            echo "=== Qwen3-8B block size (bs=256k) ==="
            for JOBS in 1 16; do
              run "qwen8b-write-j${JOBS}" write 256k "${JOBS}" "Qwen3-8B"
              run "qwen8b-read-j${JOBS}"  read  256k "${JOBS}" "Qwen3-8B"
            done

            # ── gpt-oss-120b / Qwen3-32B: ~576 KB ───────────────────────────────
            echo "=== gpt-oss-120b / Qwen3-32B block size (bs=576k) ==="
            for JOBS in 1 16; do
              run "gpt120b-write-j${JOBS}" write 576k "${JOBS}" "gpt-oss-120b"
              run "gpt120b-read-j${JOBS}"  read  576k "${JOBS}" "gpt-oss-120b"
            done

            # ── FP8-70B / BF16-70B: ~5 MB ────────────────────────────────────────
            # 5 MB = 5 × 1 MiB: aligned to XFS sunit (1 MiB) — optimal
            echo "=== FP8-70B / BF16-70B block size (bs=5m) ==="
            for JOBS in 1 16; do
              run "fp8-70b-write-j${JOBS}" write 5m "${JOBS}" "FP8-70B/BF16-70B"
              run "fp8-70b-read-j${JOBS}"  read  5m "${JOBS}" "FP8-70B/BF16-70B"
            done

            # ── Mixed read/write at FP8-70B size: steady-state offload ───────────
            echo "=== Mixed RW: FP8-70B block size, j=16 ==="
            run "fp8-70b-mixed-j16" rw 5m 16 "FP8-70B/BF16-70B steady-state"

            echo ""
            echo "=== ALL v1-fs TESTS COMPLETE ==="
        volumeMounts:
        - name: storage
          mountPath: /data
        resources:
          requests:
            cpu: "4"
            memory: "2Gi"
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: fio-nvme
