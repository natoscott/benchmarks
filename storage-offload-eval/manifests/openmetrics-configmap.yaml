# PCP openmetrics PMDA configuration for storage benchmark analysis.
#
# Two ConfigMaps:
#   openmetrics-pmda-configmap    — .url files scraped by the openmetrics PMDA
#   openmetrics-pmlogconf-configmap — pmlogconf directives telling pmlogger to log them
#
# Endpoints (plain HTTP, no auth required):
#   ceph-mgr:9283     — Ceph cluster metrics: OSD I/O, pool throughput, RGW op rates,
#                       BlueStore cache stats, cluster health
#   ceph-exporter:9926 — per-OSD and per-node Ceph perf counters
#
# Metrics appear under openmetrics.ceph_mgr.* and openmetrics.ceph_exporter.*
# (openmetrics PMDA derives the namespace from the .url filename, replacing - with _)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetrics-pmda-configmap
  namespace: storage-offload-eval
data:
  ceph_mgr.url: "http://rook-ceph-mgr.openshift-storage.svc:9283/metrics"
  ceph_exporter.url: "http://rook-ceph-exporter.openshift-storage.svc:9926/metrics"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetrics-pmlogconf-configmap
  namespace: storage-offload-eval
data:
  ceph_mgr: "#pmlogconf-setup 2.0\nident   Ceph cluster metrics (MGR Prometheus exporter)\nforce   include\n\topenmetrics.ceph_mgr\n"
  ceph_exporter: "#pmlogconf-setup 2.0\nident   Ceph per-node perf counters (ceph-exporter)\nforce   include\n\topenmetrics.ceph_exporter\n"
